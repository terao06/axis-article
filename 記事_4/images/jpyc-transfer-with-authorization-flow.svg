<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620" role="img" aria-labelledby="title desc">
  <title id="title">transferWithAuthorizationによるJPYC決済フロー</title>
  <desc id="desc">利用者が送金内容へ署名し、リレイヤーが署名に基づいて加盟店へJPYCを移転する流れ</desc>
  <defs>
    <linearGradient id="bg" x2="1" y2="1"><stop stop-color="#f8fbff"/><stop offset="1" stop-color="#fff7ed"/></linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0v6l9-3z" fill="#ea580c"/></marker>
    <style>.t{font-family:'Noto Sans JP','Yu Gothic',sans-serif;fill:#172033}.h{font-size:30px;font-weight:700}.l{font-size:21px;font-weight:700}.s{font-size:17px}.box{fill:#fff;stroke:#94a3b8;stroke-width:2}.a{stroke:#ea580c;stroke-width:4;fill:none;marker-end:url(#arrow)}</style>
  </defs>
  <rect width="1400" height="620" rx="24" fill="url(#bg)"/>
  <text class="t h" x="60" y="65">4. transferWithAuthorizationによる決済</text>
  <text class="t s" x="60" y="100">特定の送金内容への署名に基づき、Allowanceを設定せず直接移転する</text>
  <rect class="box" x="60" y="165" width="280" height="130" rx="18"/><text class="t l" x="112" y="212">利用者ウォレット</text><text class="t s" x="92" y="255">送金内容へオフチェーン署名</text>
  <g transform="translate(100 0)">
    <rect class="box" x="460" y="165" width="280" height="130" rx="18"/><text class="t l" x="557" y="212">リレイヤー</text><text class="t s" x="492" y="255">署名を受領・ガス代を負担</text>
    <rect x="350" y="390" width="500" height="135" rx="20" fill="#fff" stroke="#fb923c" stroke-width="3"/>
    <text class="t l" x="430" y="435">JPYCトークンコントラクト</text>
    <rect x="405" y="465" width="390" height="38" rx="10" fill="#ffedd5"/><text class="t s" x="425" y="490">署名検証・nonce消費・JPYC移転</text>
    <path class="a" d="M600 295v85"/><text class="t s" x="620" y="345">2. 取引を送信</text>
    <g transform="translate(100 0)">
      <rect class="box" x="900" y="392" width="240" height="130" rx="18"/><text class="t l" x="989" y="440">加盟店</text><text class="t s" x="965" y="482">JPYCを受領</text>
    </g>
    <path class="a" d="M850 457h140"/><text class="t s" x="870" y="435">3. JPYCを移転</text>
  </g>
  <path class="a" d="M340 230h210"/><text class="t s" x="375" y="207">1. Authorization署名</text>
  <rect x="70" y="555" width="1270" height="42" rx="11" fill="#fff4dc" stroke="#f59e0b"/>
  <text class="t s" x="150" y="582">前提：対象JPYCコントラクトがEIP-3009に対応していることをABIで確認する</text>
</svg>
